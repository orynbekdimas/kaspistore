{% extends "base.html" %}
{% block content %}

<h4>ActiveOrders резерв импорт</h4>
<p class="text-muted">
  Бұл бет жолдағы заказдарды оқиды да, әр тауарға <b>Резерв</b> санын есептейді.
  Резерв тек статустар бойынша есептеледі: <b>Передан курьеру</b>, <b>Ожидает передачи курьеру</b>.
</p>

<form method="post" enctype="multipart/form-data" class="mt-3">

    <input class="form-control" type="file" name="file" accept=".xlsx" required>

  <button class="btn btn-primary">Жүктеу</button>
</form>

{% endblock %}
